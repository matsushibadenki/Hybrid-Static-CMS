services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: hybrid_static_cms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  app:
    build: .
    depends_on:
      - postgres
    environment:
      PORT: 3000
      APP_URL: http://localhost:3000
      APP_NAME: Hybrid-Static-CMS
      SESSION_SECRET: change-me
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/hybrid_static_cms
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:?Set SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?Set SEED_ADMIN_PASSWORD}
      RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY:-}
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      RECAPTCHA_MIN_SCORE: ${RECAPTCHA_MIN_SCORE:-0.5}
      LOGIN_MAX_ATTEMPTS: ${LOGIN_MAX_ATTEMPTS:-8}
      LOGIN_WINDOW_SECONDS: ${LOGIN_WINDOW_SECONDS:-900}
      TWO_FACTOR_ENABLED: ${TWO_FACTOR_ENABLED:-false}
      TWO_FACTOR_SECRET: ${TWO_FACTOR_SECRET:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      PUBLIC_HTML_DIR: /app/public_html
      CONTROL_PANEL_PATH: /control-panel
      CMS_API_PREFIX: /cms-api
      CMS_OUTPUT_DIR: /app/public_html/cms
      CMS_UPLOAD_DIR: /app/public_html/cms/uploads
      TEMPLATE_DIR: /app/templates
      PLUGIN_DIR: /app/plugins
      DEFAULT_PAGE_SIZE: 10
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-20971520}
      ALLOW_SVG_UPLOADS: ${ALLOW_SVG_UPLOADS:-false}
      FORM_RATE_LIMIT_ATTEMPTS: ${FORM_RATE_LIMIT_ATTEMPTS:-5}
      FORM_RATE_LIMIT_WINDOW_SECONDS: ${FORM_RATE_LIMIT_WINDOW_SECONDS:-300}
      FORM_SUBMISSION_RETENTION_DAYS: ${FORM_SUBMISSION_RETENTION_DAYS:-0}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_TLS: ${SMTP_TLS:-true}
      SMTP_HOSTNAME: ${SMTP_HOSTNAME:-localhost}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      FORM_NOTIFICATION_EMAIL: ${FORM_NOTIFICATION_EMAIL:-}
    ports:
      - "3000:3000"
    volumes:
      - ./public_html:/app/public_html
      - ./storage:/app/storage
    command: >
      sh -lc "bun run migrate && bun run seed && bun run start"

volumes:
  postgres-data:
