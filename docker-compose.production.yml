services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PUBLIC_HTML_DIR: /app/public_html
      CMS_OUTPUT_DIR: /app/public_html/cms
      CMS_UPLOAD_DIR: /app/public_html/cms/uploads
      TEMPLATE_DIR: /app/templates
      PLUGIN_DIR: /app/plugins
    volumes:
      - ${PUBLIC_HTML_HOST_DIR:?Set PUBLIC_HTML_HOST_DIR}:/app/public_html
      - ${STORAGE_HOST_DIR:?Set STORAGE_HOST_DIR}:/app/storage
      - ${TEMPLATE_HOST_DIR:-./templates}:/app/templates:ro
      - ${PLUGIN_HOST_DIR:-./plugins}:/app/plugins:ro
    expose:
      - "3000"
    command: ["sh", "-lc", "bun run migrate && bun run start"]

volumes:
  postgres-data:
